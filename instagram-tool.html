<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: #f5f5f5; color: #333; }

.header {
  background: linear-gradient(135deg, #2e7d32, #4a8c3f, #6abf69, #4a8c3f, #2e7d32);
  color: #fff; padding: 24px; text-align: center; position: sticky; top: 0; z-index: 100;
}
.header h1 { font-size: 22px; margin-bottom: 8px; }
.header p { font-size: 13px; opacity: 0.9; }

.toolbar {
  background: #fff; border-bottom: 1px solid #ddd; padding: 12px 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 80px; z-index: 99;
}
.toolbar input[type="text"] {
  flex: 1; min-width: 200px; padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px;
}
.toolbar select {
  padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; background: #fff;
}
.toolbar .count { font-size: 13px; color: #888; margin-left: auto; }

.container { max-width: 1200px; margin: 0 auto; padding: 20px; }

.store-card {
  background: #fff; border-radius: 12px; margin-bottom: 20px; overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08); display: flex; flex-wrap: wrap;
}
.card-left { flex: 1; min-width: 320px; padding: 20px; }
.card-right { width: 400px; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; border-left: 1px solid #eee; }

.store-name { font-size: 18px; font-weight: 700; color: #262626; margin-bottom: 4px; }
.store-meta { font-size: 12px; color: #888; margin-bottom: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
.store-meta span { background: #f0f0f0; padding: 2px 8px; border-radius: 10px; }
.store-meta .tag-drop { background: #e8f5e9; color: #2e7d32; }
.store-meta .tag-month { background: #e3f2fd; color: #1565c0; }
.store-meta .tag-cafe { background: #fff3e0; color: #e65100; }
.store-meta .tag-jishu { background: #f3e5f5; color: #7b1fa2; }

.post-text {
  background: #fafafa; border: 1px solid #e0e0e0; border-radius: 8px; padding: 14px;
  font-size: 13px; line-height: 1.8; white-space: pre-wrap; word-break: break-all;
  max-height: 300px; overflow-y: auto; position: relative;
}

.btn-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.btn {
  padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px; cursor: pointer;
  font-weight: 600; transition: all 0.2s;
}
.btn-copy { background: #405DE6; color: #fff; }
.btn-copy:hover { background: #3048c8; }
.btn-copy.copied { background: #2e7d32; }
.btn-dl { background: #E1306C; color: #fff; }
.btn-dl:hover { background: #c1255a; }
.btn-edit { background: #f0f0f0; color: #333; }
.btn-edit:hover { background: #e0e0e0; }

.canvas-preview {
  border-radius: 8px; border: 1px solid #ddd;
  width: 360px; height: 360px; cursor: pointer;
}
.canvas-preview:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.15); }

.img-options { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
.img-options .btn { font-size: 11px; padding: 5px 10px; }
.theme-btn { border: 2px solid transparent !important; }
.theme-btn.active { border-color: #333 !important; }

.settings-panel {
  background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.settings-panel h3 { margin-bottom: 12px; font-size: 16px; }
.settings-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
.settings-row label { font-size: 13px; color: #666; display: block; margin-bottom: 4px; }
.settings-row input, .settings-row textarea {
  padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px;
}
.settings-row textarea { width: 100%; min-height: 60px; font-family: inherit; }

.hidden { display: none !important; }

@media (max-width: 800px) {
  .card-right { width: 100%; border-left: none; border-top: 1px solid #eee; }
  .canvas-preview { width: 300px; height: 300px; }
}

/* 全件一括DL用 */
.bulk-actions { display: flex; gap: 10px; flex-wrap: wrap; }
.bulk-actions .btn { font-size: 14px; padding: 10px 20px; }

/* 写真インポート */
.photo-section {
  width: 100%; border-top: 1px solid #eee; padding-top: 12px; margin-top: 8px;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.photo-drop {
  width: 360px; height: 80px; border: 2px dashed #ccc; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: #999; font-size: 13px; cursor: pointer; transition: all 0.2s;
  background: #fafafa; text-align: center; padding: 8px;
}
.photo-drop:hover, .photo-drop.dragover { border-color: #4a8c3f; background: #f0f8f0; color: #4a8c3f; }
.photo-drop input[type="file"] { display: none; }
.photo-preview-wrap { position: relative; }
.photo-preview {
  border-radius: 8px; border: 1px solid #ddd; max-width: 360px; max-height: 360px;
}
.logo-size-row { display: flex; gap: 6px; align-items: center; font-size: 12px; color: #666; }
.logo-size-row input[type="range"] { width: 120px; }
.logo-pos-row { display: flex; gap: 4px; flex-wrap: wrap; }
.logo-pos-row .btn { font-size: 11px; padding: 4px 8px; }
.logo-pos-row .btn.active { background: #4a8c3f; color: #fff; }

@media (max-width: 800px) {
  .photo-drop, .photo-preview { max-width: 300px; }

</style>

function getRegion(store) {
  const text = store.name + store.access;
  for (const [region, keywords] of Object.entries(REGION_KEYWORDS)) {
    if (keywords.some(k => text.includes(k))) return region;
  }
  return "その他";
}

const THEMES = {
  green: { bg: '#1b5e20', accent: '#6abf69', text: '#fff', sub: '#c8e6c9', label: 'グリーン' },
  lightgreen: { bg: '#33691e', accent: '#8bc34a', text: '#fff', sub: '#dcedc8', label: 'ライトグリーン' },
  white: { bg: '#ffffff', accent: '#4a8c3f', text: '#333', sub: '#666', label: 'ホワイト' },
  dark: { bg: '#212121', accent: '#6abf69', text: '#fff', sub: '#e0e0e0', label: 'ダーク' },
  navy: { bg: '#1a237e', accent: '#6abf69', text: '#fff', sub: '#bbdefb', label: 'ネイビー' },
  orange: { bg: '#e65100', accent: '#ffb74d', text: '#fff', sub: '#ffe0b2', label: 'オレンジ' },
};
let currentTheme = 'green';

// ロゴ画像の読み込み
const LOGO_IMG = new Image();
LOGO_IMG.crossOrigin = 'anonymous';
let logoLoaded = false;
LOGO_IMG.onload = () => { logoLoaded = true; renderStores(); };
LOGO_IMG.onerror = () => { console.warn('ロゴ画像が読み込めませんでした'); logoLoaded = false; renderStores(); };
LOGO_IMG.src = 'studygo-icon.png';

// 店舗写真データ（生成画像用）
const storePhotos = {}; // { storeId: Image }

function drawStoreImage(canvas, store, theme, size) {
  const t = THEMES[theme];
  const isWhite = (theme === 'white');
  const ctx = canvas.getContext('2d');
  const w = size, h = size;
  canvas.width = w; canvas.height = h;

  const photoImg = storePhotos[store.id];
  const hasPhoto = !!photoImg;

  // === 上半分: 店舗写真エリア (48%) ===
  const photoH = Math.round(h * 0.48);

  if (hasPhoto) {
    // 写真をカバーフィットで描画
    const imgRatio = photoImg.width / photoImg.height;
    const areaRatio = w / photoH;
    let sx = 0, sy = 0, sw = photoImg.width, sh = photoImg.height;
    if (imgRatio > areaRatio) {
      sw = photoImg.height * areaRatio;
      sx = (photoImg.width - sw) / 2;
    } else {
      sh = photoImg.width / areaRatio;
      sy = (photoImg.height - sh) / 2;
    }
    ctx.drawImage(photoImg, sx, sy, sw, sh, 0, 0, w, photoH);

    // 写真下部にグラデーションオーバーレイ（情報エリアとなじませる）
    const fadeGrad = ctx.createLinearGradient(0, photoH - h * 0.08, 0, photoH);
    fadeGrad.addColorStop(0, 'rgba(0,0,0,0)');
    fadeGrad.addColorStop(1, isWhite ? 'rgba(255,255,255,0.6)' : hexToRgba(t.bg, 0.6));
    ctx.fillStyle = fadeGrad;
    ctx.fillRect(0, photoH - h * 0.08, w, h * 0.08);
  } else {
    // 写真なし: プレースホルダー
    const grad = ctx.createLinearGradient(0, 0, w, photoH);
    grad.addColorStop(0, isWhite ? '#e8e8e8' : adjustColor(t.bg, 40));
    grad.addColorStop(1, isWhite ? '#d0d0d0' : adjustColor(t.bg, 20));
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, photoH);

    // カメラアイコン風プレースホルダー
    ctx.fillStyle = isWhite ? 'rgba(0,0,0,0.12)' : 'rgba(255,255,255,0.12)';
    const iconSize = w * 0.08;
    const cx = w / 2, cy = photoH / 2;
    roundRect(ctx, cx - iconSize, cy - iconSize * 0.7, iconSize * 2, iconSize * 1.4, 8);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx, cy, iconSize * 0.4, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = isWhite ? 'rgba(0,0,0,0.15)' : 'rgba(255,255,255,0.15)';
    const phSize = Math.round(w * 0.025);
    ctx.font = `${phSize}px 'Hiragino Sans', sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('下の「店舗写真を選択」から写真を追加', cx, cy + iconSize * 1.2);
  }

  // 写真上に「勉強場所紹介」ラベル（左上）
  const labelSize = Math.round(w * 0.028);
  const labelText = '勉強場所紹介';
  ctx.font = `bold ${labelSize}px 'Hiragino Sans', 'Noto Sans JP', sans-serif`;
  const lblW = ctx.measureText(labelText).width + w * 0.04;
  const lblH = labelSize * 2;
  const lblX = w * 0.04;
  const lblY = w * 0.04;
  roundRect(ctx, lblX, lblY, lblW, lblH, 6);
  ctx.fillStyle = 'rgba(74,140,63,0.9)';
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'left';
  ctx.fillText(labelText, lblX + w * 0.02, lblY + lblH * 0.68);

  // 写真上にロゴ（右上）
  if (logoLoaded) {
    const lh = Math.round(h * 0.07);
    const lw = Math.round(lh * (LOGO_IMG.naturalWidth / LOGO_IMG.naturalHeight));
    const lx = w - lw - w * 0.04;
    const ly = w * 0.03;
    const pad = Math.round(lw * 0.1);
    roundRect(ctx, lx - pad, ly - pad, lw + pad * 2, lh + pad * 2, 6);
    ctx.fillStyle = 'rgba(255,255,255,0.88)';
    ctx.fill();
    ctx.drawImage(LOGO_IMG, lx, ly, lw, lh);
  }

  // === 下半分: 情報エリア (52%) ===
  const infoY = photoH;
  const infoH = h - photoH;

  // 情報エリア背景
  const infoGrad = ctx.createLinearGradient(0, infoY, 0, h);
  infoGrad.addColorStop(0, t.bg);
  infoGrad.addColorStop(1, isWhite ? '#f5f5f5' : adjustColor(t.bg, 20));
  ctx.fillStyle = infoGrad;
  ctx.fillRect(0, infoY, w, infoH);

  // 装飾パターン（斜線、情報エリアのみ）
  ctx.strokeStyle = isWhite ? 'rgba(0,0,0,0.02)' : 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let i = -infoH; i < w + infoH; i += 30) {
    ctx.beginPath(); ctx.moveTo(i, infoY); ctx.lineTo(i + infoH, h); ctx.stroke();
  }

  // 店舗名
  const nameSize = Math.round(w * 0.05);
  ctx.font = `bold ${nameSize}px 'Hiragino Sans', 'Noto Sans JP', sans-serif`;
  ctx.fillStyle = t.text;
  ctx.textAlign = 'left';
  const nameLines = wrapText(ctx, store.name, w * 0.88);
  let nameY = infoY + h * 0.06;
  nameLines.slice(0, 2).forEach(line => {
    ctx.fillText(line, w * 0.06, nameY);
    nameY += nameSize * 1.25;
  });

  // 区切り線
  ctx.fillStyle = t.accent;
  ctx.fillRect(w * 0.06, nameY + h * 0.01, w * 0.15, 2);

  // アクセス情報
  const accSize = Math.round(w * 0.027);
  ctx.font = `${accSize}px 'Hiragino Sans', 'Noto Sans JP', sans-serif`;
  ctx.fillStyle = isWhite ? '#666' : t.sub;
  const accLines = wrapText(ctx, store.access, w * 0.82);
  let accY = nameY + h * 0.055;
  accLines.slice(0, 2).forEach((line, i) => {
    ctx.fillText((i === 0 ? '\u{1F689} ' : '    ') + line, w * 0.06, accY);
    accY += accSize * 1.5;
  });

  // 料金ボックス
  const boxY = h - h * 0.18;
  const boxH = h * 0.12;
  roundRect(ctx, w * 0.06, boxY, w * 0.88, boxH, 10);
  ctx.fillStyle = isWhite ? 'rgba(74,140,63,0.06)' : 'rgba(255,255,255,0.08)';
  ctx.fill();
  ctx.strokeStyle = isWhite ? 'rgba(74,140,63,0.2)' : 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  ctx.stroke();

  const priceSize = Math.round(w * 0.032);
  const priceLabelSize = Math.round(w * 0.022);
  ctx.textAlign = 'center';

  if (store.drop && store.month) {
    ctx.fillStyle = isWhite ? '#666' : t.sub;
    ctx.font = `${priceLabelSize}px 'Hiragino Sans', sans-serif`;
    ctx.fillText('ドロップイン', w * 0.3, boxY + boxH * 0.38);
    ctx.fillStyle = t.accent;
    ctx.font = `bold ${priceSize}px 'Hiragino Sans', sans-serif`;
    ctx.fillText(store.drop, w * 0.3, boxY + boxH * 0.72);
    ctx.strokeStyle = isWhite ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.15)';
    ctx.beginPath(); ctx.moveTo(w * 0.5, boxY + boxH * 0.15); ctx.lineTo(w * 0.5, boxY + boxH * 0.85); ctx.stroke();
    ctx.fillStyle = isWhite ? '#666' : t.sub;
    ctx.font = `${priceLabelSize}px 'Hiragino Sans', sans-serif`;
    ctx.fillText('月額プラン', w * 0.7, boxY + boxH * 0.38);
    ctx.fillStyle = t.accent;
    ctx.font = `bold ${priceSize}px 'Hiragino Sans', sans-serif`;
    ctx.fillText(store.month, w * 0.7, boxY + boxH * 0.72);
  } else if (store.drop) {
    ctx.fillStyle = isWhite ? '#666' : t.sub;
    ctx.font = `${priceLabelSize}px 'Hiragino Sans', sans-serif`;
    ctx.fillText('ドロップイン', w * 0.5, boxY + boxH * 0.38);
    ctx.fillStyle = t.accent;
    ctx.font = `bold ${priceSize}px 'Hiragino Sans', sans-serif`;
    ctx.fillText(store.drop, w * 0.5, boxY + boxH * 0.72);
  } else if (store.month) {
    ctx.fillStyle = isWhite ? '#666' : t.sub;
    ctx.font = `${priceLabelSize}px 'Hiragino Sans', sans-serif`;
    ctx.fillText('月額プラン', w * 0.5, boxY + boxH * 0.38);
    ctx.fillStyle = t.accent;
    ctx.font = `bold ${priceSize}px 'Hiragino Sans', sans-serif`;
    ctx.fillText(store.month, w * 0.5, boxY + boxH * 0.72);
  }

  // 下部: URL
  const footSize = Math.round(w * 0.02);
  ctx.font = `${footSize}px 'Segoe UI', sans-serif`;
  ctx.fillStyle = isWhite ? 'rgba(0,0,0,0.25)' : 'rgba(255,255,255,0.35)';
  ctx.textAlign = 'center';
  ctx.fillText(`https://studygo.jp/store?shopId=${store.id}`, w / 2, h * 0.97);
}

function hexToRgba(hex, alpha) {
  const num = parseInt(hex.replace('#', ''), 16);
  return `rgba(${(num >> 16) & 0xff},${(num >> 8) & 0xff},${num & 0xff},${alpha})`;
}

function adjustColor(hex, amount) {
  const num = parseInt(hex.replace('#', ''), 16);
  const r = Math.min(255, ((num >> 16) & 0xff) + amount);
  const g = Math.min(255, ((num >> 8) & 0xff) + amount);
  const b = Math.min(255, (num & 0xff) + amount);
  return `rgb(${r},${g},${b})`;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function wrapText(ctx, text, maxWidth) {
  const chars = [...text];
  const lines = [];
  let line = '';
  for (const ch of chars) {
    const test = line + ch;
    if (ctx.measureText(test).width > maxWidth && line.length > 0) {
      lines.push(line);
      line = ch;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

// ============================================================
// UI
// ============================================================
function renderStores() {
  const list = document.getElementById('storeList');
  list.innerHTML = '';

  const search = document.getElementById('searchBox').value.toLowerCase();
  const catFilter = document.getElementById('categoryFilter').value;
  const regionFilter = document.getElementById('regionFilter').value;

  let filtered = STORES.filter(s => {
    const text = (s.name + s.access).toLowerCase();
    if (search && !text.includes(search)) return false;
    if (catFilter) {
      if (catFilter === 'コワーキング' && (s.cat === '自習室専業' || s.cat === 'カフェ' || s.cat2)) return false;
      if (catFilter === '自習室専業' && s.cat !== '自習室専業') return false;
      if (catFilter === 'カフェ' && s.cat !== 'カフェ') return false;
      if (catFilter === '勉強カフェ' && s.cat2 !== '勉強カフェ') return false;
      if (catFilter === 'SoloTime' && s.cat2 !== 'SoloTime') return false;
      if (catFilter === 'アントレサロン' && s.cat2 !== 'アントレサロン') return false;
      if (catFilter === 'MIRAIYA' && s.cat2 !== 'MIRAIYA') return false;
    }
    if (regionFilter && getRegion(s) !== regionFilter) return false;
    return true;
  });

  document.getElementById('storeCount').textContent = `${filtered.length}件表示 / 全${STORES.length}件`;

  filtered.forEach(store => {
    const card = document.createElement('div');
    card.className = 'store-card';
    card.dataset.id = store.id;

    const postText = generatePostText(store);
    const tags = [];
    if (store.drop) tags.push(`<span class="tag-drop">ドロップイン ${store.drop}</span>`);
    if (store.month) tags.push(`<span class="tag-month">月額 ${store.month}</span>`);
    if (store.cat === 'カフェ') tags.push(`<span class="tag-cafe">カフェ</span>`);
    if (store.cat === '自習室専業') tags.push(`<span class="tag-jishu">自習室</span>`);
    if (store.dropNow) tags.push(`<span class="tag-drop">受付中</span>`);

    card.innerHTML = `
      <div class="card-left">
        <div class="store-name">${store.name}</div>
        <div class="store-meta">${tags.join('')}</div>
        <div class="post-text" id="text-${store.id}">${escapeHtml(postText)}</div>
        <div class="btn-row">
          <button class="btn btn-copy" onclick="copyText(${store.id}, this)">投稿文をコピー</button>
          <button class="btn btn-edit" onclick="editText(${store.id})">編集</button>
        </div>
      </div>
      <div class="card-right">
        <canvas class="canvas-preview" id="canvas-${store.id}" width="360" height="360"></canvas>
        <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;align-items:center;">
          <label class="btn" style="background:#4a8c3f;color:#fff;cursor:pointer;">
            店舗写真を選択
            <input type="file" accept="image/*" style="display:none" onchange="handleStorePhoto(${store.id},this)">
          </label>
          <button class="btn btn-edit" id="clearStorePhoto-${store.id}" style="display:none" onclick="clearStorePhoto(${store.id})">写真クリア</button>
        </div>
        <div class="img-options">
          ${Object.entries(THEMES).map(([k, v]) =>
            `<button class="btn theme-btn ${k === currentTheme ? 'active' : ''}" style="background:${v.bg};color:${v.text}" onclick="changeTheme(${store.id},'${k}',this)">${v.label}</button>`
          ).join('')}
        </div>
        <button class="btn btn-dl" onclick="downloadImage(${store.id})">画像をダウンロード (1080x1080)</button>
        <div class="photo-section">
          <div class="photo-drop" id="photoDrop-${store.id}" onclick="document.getElementById('photoInput-${store.id}').click()"
               ondragover="event.preventDefault();this.classList.add('dragover')"
               ondragleave="this.classList.remove('dragover')"
               ondrop="event.preventDefault();this.classList.remove('dragover');handlePhotoDrop(${store.id},event)">
            店舗写真をここにドロップ<br>またはクリックして選択
            <input type="file" id="photoInput-${store.id}" accept="image/*" onchange="handlePhotoSelect(${store.id},this)">
          </div>
          <div id="photoResult-${store.id}" class="hidden">
            <canvas class="photo-preview" id="photoCanvas-${store.id}" width="360" height="360"></canvas>
            <div style="display:flex;gap:6px;align-items:center;margin-top:6px;flex-wrap:wrap;justify-content:center;">
              <div class="logo-size-row">
                <span>ロゴサイズ</span>
                <input type="range" min="5" max="30" value="15" oninput="updatePhotoLogo(${store.id})">
                <span id="logoSizeLabel-${store.id}">15%</span>
              </div>
              <div class="logo-pos-row">
                <button class="btn" onclick="setLogoPos(${store.id},'tl',this)">左上</button>
                <button class="btn active" onclick="setLogoPos(${store.id},'tr',this)">右上</button>
                <button class="btn" onclick="setLogoPos(${store.id},'bl',this)">左下</button>
                <button class="btn" onclick="setLogoPos(${store.id},'br',this)">右下</button>
              </div>
            </div>
            <div style="display:flex;gap:6px;margin-top:8px;justify-content:center;">
              <button class="btn btn-dl" onclick="downloadPhoto(${store.id})">ロゴ入り写真をDL</button>
              <button class="btn btn-edit" onclick="clearPhoto(${store.id})">写真をクリア</button>
            </div>
          </div>
        </div>
      </div>
    `;
    list.appendChild(card);

    // プレビュー描画
    const previewCanvas = document.getElementById(`canvas-${store.id}`);
    drawStoreImage(previewCanvas, store, currentTheme, 360);
  });
}

function filterStores() { renderStores(); }

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function copyText(id, btn) {
  const el = document.getElementById(`text-${id}`);
  const text = el.innerText || el.textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'コピー済み!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '投稿文をコピー'; btn.classList.remove('copied'); }, 2000);
  });
}

function editText(id) {
  const el = document.getElementById(`text-${id}`);
  if (el.contentEditable === 'true') {
    el.contentEditable = 'false';
    el.style.background = '#fafafa';
  } else {
    el.contentEditable = 'true';
    el.style.background = '#fff8e1';
    el.focus();
  }
}

function handleStorePhoto(id, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      storePhotos[id] = img;
      // プレビュー再描画
      const canvas = document.getElementById(`canvas-${id}`);
      const card = document.querySelector(`.store-card[data-id="${id}"]`);
      const activeBtn = card ? card.querySelector('.theme-btn.active') : null;
      let theme = currentTheme;
      if (activeBtn) { const m = activeBtn.getAttribute('onclick').match(/'(\w+)'/); if (m) theme = m[1]; }
      drawStoreImage(canvas, STORES.find(s => s.id === id), theme, 360);
      document.getElementById(`clearStorePhoto-${id}`).style.display = '';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function clearStorePhoto(id) {
  delete storePhotos[id];
  const canvas = document.getElementById(`canvas-${id}`);
  const card = document.querySelector(`.store-card[data-id="${id}"]`);
  const activeBtn = card ? card.querySelector('.theme-btn.active') : null;
  let theme = currentTheme;
  if (activeBtn) { const m = activeBtn.getAttribute('onclick').match(/'(\w+)'/); if (m) theme = m[1]; }
  drawStoreImage(canvas, STORES.find(s => s.id === id), theme, 360);
  document.getElementById(`clearStorePhoto-${id}`).style.display = 'none';
}

function changeTheme(id, theme, btn) {
  const store = STORES.find(s => s.id === id);
  const canvas = document.getElementById(`canvas-${id}`);
  drawStoreImage(canvas, store, theme, 360);

  // ボタンのactive状態を更新
  const card = btn.closest('.card-right');
  card.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function downloadImage(id) {
  const store = STORES.find(s => s.id === id);
  const offscreen = document.getElementById('offscreenCanvas');

  // プレビューから現在のテーマを取得
  const card = document.querySelector(`.store-card[data-id="${id}"]`);
  const activeBtn = card ? card.querySelector('.theme-btn.active') : null;
  let theme = currentTheme;
  if (activeBtn) {
    const onclick = activeBtn.getAttribute('onclick');
    const m = onclick.match(/'(\w+)'/);
    if (m) theme = m[1];
  }

  drawStoreImage(offscreen, store, theme, 1080);
  const link = document.createElement('a');
  link.download = `StudyGO_${store.name.replace(/[\s　\/\\]/g, '_')}.png`;
  link.href = offscreen.toDataURL('image/png');
  link.click();
}

function copyAllTexts() {
  const textEls = document.querySelectorAll('.post-text');
  const allText = Array.from(textEls).map(el => el.innerText || el.textContent).join('\n\n' + '='.repeat(50) + '\n\n');
  navigator.clipboard.writeText(allText).then(() => alert(`${textEls.length}件の投稿文をコピーしました`));
}

function downloadAllImages() {
  const cards = document.querySelectorAll('.store-card');
  if (cards.length > 50) {
    if (!confirm(`${cards.length}件の画像をダウンロードします。よろしいですか？`)) return;
  }
  let delay = 0;
  cards.forEach(card => {
    const id = parseInt(card.dataset.id);
    setTimeout(() => downloadImage(id), delay);
    delay += 200;
  });
}

// ============================================================
// 写真インポート + ロゴ合成
// ============================================================
const photoData = {}; // { storeId: { img, pos:'tr', sizePct:15 } }

function handlePhotoDrop(id, e) {
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadPhoto(id, file);
}

function handlePhotoSelect(id, input) {
  const file = input.files[0];
  if (file) loadPhoto(id, file);
}

function loadPhoto(id, file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      photoData[id] = { img, pos: 'tr', sizePct: 15 };
      document.getElementById(`photoDrop-${id}`).classList.add('hidden');
      document.getElementById(`photoResult-${id}`).classList.remove('hidden');
      drawPhotoWithLogo(id, 360);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function drawPhotoWithLogo(id, previewSize) {
  const data = photoData[id];
  if (!data) return;

  const canvas = document.getElementById(`photoCanvas-${id}`);
  const ctx = canvas.getContext('2d');
  const img = data.img;

  // プレビュー: アスペクト比維持で表示
  const scale = Math.min(previewSize / img.width, previewSize / img.height);
  const cw = Math.round(img.width * scale);
  const ch = Math.round(img.height * scale);
  canvas.width = cw;
  canvas.height = ch;

  ctx.drawImage(img, 0, 0, cw, ch);
  drawLogoOnCanvas(ctx, cw, ch, data.pos, data.sizePct);
}

function drawLogoOnCanvas(ctx, cw, ch, pos, sizePct) {
  if (!logoLoaded) return;

  const logoW = Math.round(cw * sizePct / 100);
  const logoH = Math.round(logoW * (LOGO_IMG.naturalHeight / LOGO_IMG.naturalWidth));
  const margin = Math.round(cw * 0.03);

  // 半透明白背景
  let lx, ly;
  if (pos === 'tl') { lx = margin; ly = margin; }
  else if (pos === 'tr') { lx = cw - logoW - margin; ly = margin; }
  else if (pos === 'bl') { lx = margin; ly = ch - logoH - margin; }
  else { lx = cw - logoW - margin; ly = ch - logoH - margin; }

  const pad = Math.round(logoW * 0.08);
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  roundRect(ctx, lx - pad, ly - pad, logoW + pad * 2, logoH + pad * 2, Math.round(pad * 0.8));
  ctx.fill();

  ctx.drawImage(LOGO_IMG, lx, ly, logoW, logoH);
}

function updatePhotoLogo(id) {
  const data = photoData[id];
  if (!data) return;
  const slider = document.querySelector(`#photoResult-${id} input[type="range"]`);
  data.sizePct = parseInt(slider.value);
  document.getElementById(`logoSizeLabel-${id}`).textContent = data.sizePct + '%';
  drawPhotoWithLogo(id, 360);
}

function setLogoPos(id, pos, btn) {
  const data = photoData[id];
  if (!data) return;
  data.pos = pos;
  btn.closest('.logo-pos-row').querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  drawPhotoWithLogo(id, 360);
}

function downloadPhoto(id) {
  const data = photoData[id];
  if (!data) return;
  const store = STORES.find(s => s.id === id);

  // フルサイズで描画
  const offCanvas = document.createElement('canvas');
  const ctx = offCanvas.getContext('2d');
  offCanvas.width = data.img.width;
  offCanvas.height = data.img.height;
  ctx.drawImage(data.img, 0, 0);
  drawLogoOnCanvas(ctx, data.img.width, data.img.height, data.pos, data.sizePct);

  const link = document.createElement('a');
  link.download = `StudyGO_${store.name.replace(/[\s　\/\\]/g, '_')}_photo.png`;
  link.href = offCanvas.toDataURL('image/png');
  link.click();
}

function clearPhoto(id) {
  delete photoData[id];
  document.getElementById(`photoDrop-${id}`).classList.remove('hidden');
  document.getElementById(`photoResult-${id}`).classList.add('hidden');
  // ファイル入力リセット
  const input = document.getElementById(`photoInput-${id}`);
  if (input) input.value = '';
}

function toggleSettings() {
  // ハッシュタグを変更後、全投稿を再描画
  renderStores();
}

// 初期化
renderStores();
