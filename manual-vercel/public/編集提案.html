<!DOCTYPE html>
<html lang="ja">
<head>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --cafe: #4CAF50;
            --cafe-light: #E8F5E9;
            --change: #FF5722;
            --change-light: #FBE9E7;
            --studygo: #2196F3;
            --studygo-light: #E3F2FD;
            --staff: #9C27B0;
            --staff-light: #F3E5F5;
            --border: #e0e0e0;
            --bg: #f8f9fa;
        }
        body {
            font-family: 'Hiragino Kaku Gothic ProN', 'メイリオ', sans-serif;
            line-height: 1.7;
            color: #333;
            background: var(--bg);
        }

        /* ヘッダー */
        .page-header {
            background: linear-gradient(135deg, #1a237e, #283593);
            color: white;
            padding: 24px 32px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }
        .page-header h1 { font-size: 1.3rem; }
        .page-header p { font-size: 0.85rem; opacity: 0.85; margin-top: 4px; }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }
        .header-stats {
            display: flex;
            gap: 16px;
            font-size: 0.82rem;
        }
        .stat-box {
            background: rgba(255,255,255,0.15);
            padding: 4px 14px;
            border-radius: 20px;
        }
        .stat-box strong { font-size: 1.1rem; }

        /* レイアウト */
        .layout {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            gap: 0;
        }

        /* サイドナビ */
        .side-nav {
            width: 260px;
            flex-shrink: 0;
            position: sticky;
            top: 80px;
            height: calc(100vh - 80px);
            overflow-y: auto;
            background: white;
            border-right: 1px solid var(--border);
            padding: 16px 0;
        }
        .side-nav::-webkit-scrollbar { width: 4px; }
        .side-nav::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }
        .nav-cat-label {
            padding: 8px 20px 4px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #999;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 20px;
            font-size: 0.82rem;
            color: #555;
            text-decoration: none;
            border-left: 3px solid transparent;
            transition: all 0.15s;
            cursor: pointer;
        }
        .nav-item:hover { background: #f5f5f5; color: #333; }
        .nav-item.active { border-left-color: #1a237e; background: #E8EAF6; color: #1a237e; font-weight: bold; }
        .nav-badge {
            margin-left: auto;
            font-size: 0.65rem;
            padding: 1px 7px;
            border-radius: 10px;
            font-weight: bold;
        }
        .nav-badge.todo { background: #FFF3E0; color: #E65100; }
        .nav-badge.done { background: #E8F5E9; color: #2E7D32; }
        .nav-badge.editing { background: #E3F2FD; color: #1565C0; }

        /* メインコンテンツ */
        .main-content {
            flex: 1;
            padding: 24px 32px;
            min-width: 0;
        }

        /* 凡例 */
        .legend {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            padding: 16px 20px;
            background: white;
            border-radius: 10px;
            border: 1px solid var(--border);
            font-size: 0.82rem;
            align-items: center;
        }
        .legend-title { font-weight: bold; margin-right: 8px; }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-dot {
            width: 12px; height: 12px; border-radius: 50%;
        }

        /* セクションカード */
        .section-card {
            background: white;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            overflow: hidden;
            transition: box-shadow 0.2s;
        }
        .section-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            cursor: pointer;
            user-select: none;
        }
        .section-header:hover { background: #fafafa; }
        .section-cat-badge {
            font-size: 0.68rem;
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: bold;
            white-space: nowrap;
        }
        .cat-cafe .section-cat-badge { background: var(--cafe-light); color: #2E7D32; }
        .cat-change .section-cat-badge { background: var(--change-light); color: #BF360C; }
        .cat-studygo .section-cat-badge { background: var(--studygo-light); color: #1565C0; }
        .cat-staff .section-cat-badge { background: var(--staff-light); color: #6A1B9A; }
        .section-title { font-size: 1rem; font-weight: bold; flex: 1; }
        .section-meta { font-size: 0.75rem; color: #999; }
        .section-toggle {
            font-size: 1.2rem;
            color: #999;
            transition: transform 0.2s;
        }
        .section-card.open .section-toggle { transform: rotate(180deg); }
        .section-status {
            font-size: 0.72rem;
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: bold;
        }
        .status-todo { background: #FFF3E0; color: #E65100; }
        .status-editing { background: #E3F2FD; color: #1565C0; }
        .status-done { background: #E8F5E9; color: #2E7D32; }

        /* セクション内容 */
        .section-body {
            display: none;
            border-top: 1px solid var(--border);
        }
        .section-card.open .section-body { display: block; }

        /* h3項目リスト */
        .h3-list {
            padding: 0;
            margin: 0;
        }
        .h3-item {
            display: flex;
            align-items: stretch;
            border-bottom: 1px solid #f0f0f0;
        }
        .h3-item:last-child { border-bottom: none; }
        .h3-item-left {
            width: 50%;
            padding: 14px 20px;
            background: #fafbfc;
            border-right: 1px solid #f0f0f0;
        }
        .h3-item-right {
            width: 50%;
            padding: 14px 20px;
        }
        .h3-label {
            font-size: 0.72rem;
            font-weight: bold;
            color: #999;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .h3-name {
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 6px;
        }
        .h3-current-summary {
            font-size: 0.8rem;
            color: #666;
            line-height: 1.5;
        }
        .proposal-text {
            font-size: 0.82rem;
            color: #1565C0;
            line-height: 1.6;
            min-height: 40px;
        }
        .proposal-text.empty {
            color: #bbb;
            font-style: italic;
        }

        /* 決定・保留ボタン */
        .h3-actions {
            display: flex;
            gap: 6px;
            margin-top: 10px;
        }
        .h3-action-btn {
            padding: 4px 14px;
            border: 1px solid var(--border);
            border-radius: 16px;
            font-size: 0.72rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s;
            background: white;
        }
        .h3-action-btn:hover { opacity: 0.85; }
        .btn-ok {
            border-color: #4CAF50;
            color: #2E7D32;
        }
        .btn-ok:hover { background: #E8F5E9; }
        .btn-ok.active {
            background: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }
        .btn-hold {
            border-color: #FF9800;
            color: #E65100;
        }
        .btn-hold:hover { background: #FFF3E0; }
        .btn-hold.active {
            background: #FF9800;
            color: white;
            border-color: #FF9800;
        }
        .btn-edit {
            border-color: #90CAF9;
            color: #1565C0;
        }
        .btn-edit:hover { background: #E3F2FD; }
        .h3-decision-badge {
            display: inline-block;
            font-size: 0.68rem;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            margin-left: 6px;
        }
        .decision-ok { background: #E8F5E9; color: #2E7D32; }
        .decision-hold { background: #FFF3E0; color: #E65100; }

        /* 提案タグ */
        .proposal-tag {
            display: inline-block;
            font-size: 0.68rem;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            margin-right: 4px;
            margin-bottom: 4px;
        }
        .tag-add { background: #E8F5E9; color: #2E7D32; }
        .tag-update { background: #E3F2FD; color: #1565C0; }
        .tag-delete { background: #FFEBEE; color: #C62828; }
        .tag-rewrite { background: #FFF3E0; color: #E65100; }
        .tag-keep { background: #F5F5F5; color: #757575; }
        .tag-verify { background: #F3E5F5; color: #6A1B9A; }

        /* サマリーバー */
        .section-summary-bar {
            display: flex;
            gap: 12px;
            padding: 10px 20px;
            background: #f5f6f7;
            font-size: 0.78rem;
            flex-wrap: wrap;
        }
        .summary-chip {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .summary-chip-dot {
            width: 8px; height: 8px; border-radius: 50%;
        }

        /* 進捗バー */
        .progress-bar-container {
            padding: 12px 20px;
            background: #f9f9f9;
        }
        .progress-bar {
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #2E7D32);
            border-radius: 2px;
            transition: width 0.3s;
        }

        /* フィルター */
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: white;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .filter-btn:hover { border-color: #999; }
        .filter-btn.active { background: #1a237e; color: white; border-color: #1a237e; }

        /* メモエリア */
        .section-note {
            padding: 12px 20px;
            background: #FFFDE7;
            border-top: 1px solid #FFF9C4;
        }
        .section-note textarea {
            width: 100%;
            border: 1px solid #E0E0E0;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 0.82rem;
            font-family: inherit;
            resize: vertical;
            min-height: 50px;
            line-height: 1.5;
        }
        .section-note textarea:focus {
            outline: none;
            border-color: #1a237e;
        }
        .section-note-label {
            font-size: 0.72rem;
            font-weight: bold;
            color: #F9A825;
            margin-bottom: 4px;
        }

        /* レスポンシブ */
        @media (max-width: 900px) {
            .side-nav { display: none; }
            .main-content { padding: 16px; }
            .h3-item { flex-direction: column; }
            .h3-item-left, .h3-item-right { width: 100%; border-right: none; }
            .h3-item-left { border-bottom: 1px dashed #e0e0e0; }
            .header-stats { display: none; }
        }

        /* 印刷 */
        @media print {
            .side-nav, .page-header, .filter-bar, .legend { display: none; }
            .section-body { display: block !important; }
            .section-card { break-inside: avoid; }
        }
    </style>
</head>

            <button class="filter-btn" data-filter="undecided">未判定あり</button>
        </div>

        <div id="sectionContainer"></div>
    </div>
</div>

const container = document.getElementById('sectionContainer');
const sideNav = document.getElementById('sideNav');

// localStorage保存キー
const STORAGE_KEY = 'manual_edit_proposals';

// 保存データ読み込み
function loadSavedData() {
    try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        sections.forEach(sec => {
            if (saved[sec.id]) {
                sec.status = saved[sec.id].status || sec.status;
                sec.note = saved[sec.id].note || '';
                sec.h3s.forEach((h3, i) => {
                    if (saved[sec.id].h3s && saved[sec.id].h3s[i]) {
                        h3.proposal = saved[sec.id].h3s[i].proposal || '';
                        h3.tag = saved[sec.id].h3s[i].tag || '';
                        h3.decision = saved[sec.id].h3s[i].decision || '';
                    }
                });
            }
        });
    } catch(e) {}
}

function saveData() {
    const data = {};
    sections.forEach(sec => {
        data[sec.id] = {
            status: sec.status,
            note: sec.note || '',
            h3s: sec.h3s.map(h3 => ({ proposal: h3.proposal, tag: h3.tag, decision: h3.decision || '' }))
        };
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

loadSavedData();

// サイドナビ生成
function renderSideNav() {
    let html = '';
    let lastCat = '';
    const catNames = { cafe: '勉強カフェ', change: '変更点', studygo: 'スタディGO', staff: 'スタッフマニュアル' };
    sections.forEach(sec => {
        if (sec.category !== lastCat) {
            html += `<div class="nav-cat-label">${catNames[sec.category]}</div>`;
            lastCat = sec.category;
        }
        const okN = sec.h3s.filter(h => h.decision === 'ok').length;
        const holdN = sec.h3s.filter(h => h.decision === 'hold').length;
        const decidedAll = (okN + holdN) === sec.h3s.length && sec.h3s.length > 0;
        const badgeClass = decidedAll ? 'done' : (okN + holdN) > 0 ? 'editing' : 'todo';
        const badgeText = decidedAll ? `${okN + holdN}/${sec.h3s.length}` : (okN + holdN) > 0 ? `${okN + holdN}/${sec.h3s.length}` : '未着手';
        html += `<a class="nav-item" data-nav="${sec.id}" onclick="scrollToSection('${sec.id}')">
            <span>${sec.title}</span>
            <span class="nav-badge ${badgeClass}">${badgeText}</span>
        </a>`;
    });
    sideNav.innerHTML = html;
}

// メインコンテンツ生成
function renderSections(filter) {
    let html = '';
    let filtered;
    if (!filter || filter === 'all') {
        filtered = sections;
    } else if (filter === 'status-todo') {
        filtered = sections.filter(s => s.status === 'todo');
    } else if (filter === 'has-ok') {
        filtered = sections.filter(s => s.h3s.some(h => h.decision === 'ok'));
    } else if (filter === 'has-hold') {
        filtered = sections.filter(s => s.h3s.some(h => h.decision === 'hold'));
    } else if (filter === 'undecided') {
        filtered = sections.filter(s => s.h3s.some(h => !h.decision));
    } else {
        filtered = sections.filter(s => s.category === filter);
    }

    filtered.forEach(sec => {
        const statusLabel = sec.status === 'done' ? '完了' : sec.status === 'editing' ? '編集中' : '未着手';
        const statusClass = sec.status === 'done' ? 'status-done' : sec.status === 'editing' ? 'status-editing' : 'status-todo';

        let h3Html = '';
        sec.h3s.forEach((h3, i) => {
            const tagHtml = h3.tag ? `<span class="proposal-tag tag-${h3.tag}">${getTagLabel(h3.tag)}</span>` : '';
            const proposalContent = h3.proposal
                ? `${tagHtml}<span>${escHtml(h3.proposal)}</span>`
                : `<span class="proposal-text empty">クリックして編集提案を入力...</span>`;
            const dec = h3.decision || '';
            const decBadge = dec === 'ok' ? '<span class="h3-decision-badge decision-ok">決定</span>'
                           : dec === 'hold' ? '<span class="h3-decision-badge decision-hold">保留</span>' : '';

            h3Html += `
                <div class="h3-item" style="${dec === 'ok' ? 'background:#f9fdf9;' : dec === 'hold' ? 'background:#fffcf5;opacity:0.7;' : ''}">
                    <div class="h3-item-left" style="${dec === 'ok' ? 'background:#f0f9f0;' : ''}">
                        <div class="h3-label">現在の内容</div>
                        <div class="h3-name">${escHtml(h3.name)}${decBadge}</div>
                        <div class="h3-current-summary">${escHtml(h3.current)}</div>
                    </div>
                    <div class="h3-item-right">
                        <div class="h3-label">編集提案</div>
                        <div class="proposal-text" onclick="editProposal('${sec.id}', ${i})" style="cursor:pointer;" title="クリックして編集">${proposalContent}</div>
                        <div class="h3-actions">
                            <button class="h3-action-btn btn-ok ${dec === 'ok' ? 'active' : ''}" onclick="setDecision('${sec.id}', ${i}, 'ok')">決定</button>
                            <button class="h3-action-btn btn-hold ${dec === 'hold' ? 'active' : ''}" onclick="setDecision('${sec.id}', ${i}, 'hold')">保留</button>
                            <button class="h3-action-btn btn-edit" onclick="editProposal('${sec.id}', ${i})">提案を編集</button>
                        </div>
                    </div>
                </div>`;
        });

        // 判定済み数（決定 or 保留）
        const proposedCount = sec.h3s.filter(h => h.decision === 'ok' || h.decision === 'hold').length;

        html += `
            <div class="section-card cat-${sec.category}" id="card-${sec.id}" data-cat="${sec.category}">
                <div class="section-header" onclick="toggleSection('${sec.id}')">
                    <span class="section-cat-badge">${escHtml(sec.catLabel)}</span>
                    <span class="section-title">${escHtml(sec.title)}</span>
                    <span class="section-meta">${sec.lines} / h3: ${sec.h3s.length}件</span>
                    <select class="section-status ${statusClass}" onchange="changeStatus('${sec.id}', this.value)" onclick="event.stopPropagation()">
                        <option value="todo" ${sec.status==='todo'?'selected':''}>未着手</option>
                        <option value="editing" ${sec.status==='editing'?'selected':''}>編集中</option>
                        <option value="done" ${sec.status==='done'?'selected':''}>完了</option>
                    </select>
                    <span class="section-meta">${proposedCount}/${sec.h3s.length}</span>
                    <span class="section-toggle">&#9660;</span>
                </div>
                <div class="section-body">
                    <div class="progress-bar-container">
                        <div class="progress-bar">
                            <div class="progress-bar-fill" style="width: ${sec.h3s.length ? (proposedCount/sec.h3s.length*100) : 0}%"></div>
                        </div>
                    </div>
                    <div class="h3-list">${h3Html}</div>
                    <div class="section-note">
                        <div class="section-note-label">メモ</div>
                        <textarea placeholder="このセクションへのメモ・気づきを記入..."
                            onblur="saveNote('${sec.id}', this.value)">${escHtml(sec.note || '')}</textarea>
                    </div>
                </div>
            </div>`;
    });

    // 開いているセクションを記憶
    const openIds = [];
    container.querySelectorAll('.section-card.open').forEach(el => {
        openIds.push(el.id);
    });

    container.innerHTML = html;

    // 開いていたセクションを復元
    openIds.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.add('open');
    });

    updateStats();
}

function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getTagLabel(tag) {
    const map = { add: '追加', update: '更新', delete: '削除', rewrite: '書き直し', keep: '維持', verify: '要確認' };
    return map[tag] || tag;
}

// セクション開閉
function toggleSection(id) {
    const card = document.getElementById('card-' + id);
    card.classList.toggle('open');
}

// セクションへスクロール
function scrollToSection(id) {
    const card = document.getElementById('card-' + id);
    if (card) {
        card.classList.add('open');
        card.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
    // ナビアクティブ
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const navItem = document.querySelector(`.nav-item[data-nav="${id}"]`);
    if (navItem) navItem.classList.add('active');
}

// ステータス変更
function changeStatus(id, value) {
    const sec = sections.find(s => s.id === id);
    if (sec) {
        sec.status = value;
        saveData();
        renderSideNav();
        // ステータスセレクトのクラスを更新
        const select = document.querySelector(`#card-${id} .section-status`);
        if (select) {
            select.className = 'section-status ' + (value === 'done' ? 'status-done' : value === 'editing' ? 'status-editing' : 'status-todo');
        }
        updateStats();
    }
}

// メモ保存
function saveNote(id, value) {
    const sec = sections.find(s => s.id === id);
    if (sec) {
        sec.note = value;
        saveData();
    }
}

// 決定・保留の設定
function setDecision(secId, h3Index, value) {
    const sec = sections.find(s => s.id === secId);
    if (!sec) return;
    const h3 = sec.h3s[h3Index];
    // トグル：同じボタンを再度押すと解除
    h3.decision = h3.decision === value ? '' : value;
    saveData();
    renderSections(currentFilter);
    renderSideNav();
}

// 提案編集
function editProposal(secId, h3Index) {
    const sec = sections.find(s => s.id === secId);
    if (!sec) return;
    const h3 = sec.h3s[h3Index];

    // タグ選択
    const tagChoice = prompt(
        `【${h3.name}】の編集タグを選択（番号を入力）:\n` +
        `1: 追加（新規コンテンツ）\n` +
        `2: 更新（内容の修正・追記）\n` +
        `3: 書き直し（大幅リライト）\n` +
        `4: 削除（不要箇所の除去）\n` +
        `5: 要確認（事実確認が必要）\n` +
        `6: 維持（変更不要）\n` +
        `0: タグなし`,
        h3.tag ? { add:'1',update:'2',rewrite:'3',delete:'4',verify:'5',keep:'6' }[h3.tag] || '' : ''
    );

    if (tagChoice === null) return;
    const tagMap = { '1':'add', '2':'update', '3':'rewrite', '4':'delete', '5':'verify', '6':'keep', '0':'' };
    h3.tag = tagMap[tagChoice] || h3.tag;

    // 提案テキスト
    const proposal = prompt(`【${h3.name}】の編集提案を入力:`, h3.proposal || '');
    if (proposal === null) return;
    h3.proposal = proposal;

    saveData();
    renderSections(currentFilter);
}

// 統計更新
function updateStats() {
    const allH3s = sections.flatMap(s => s.h3s);
    const totalH3 = allH3s.length;
    const okCount = allH3s.filter(h => h.decision === 'ok').length;
    const holdCount = allH3s.filter(h => h.decision === 'hold').length;
    const doneCount = sections.filter(s => s.status === 'done').length;
    document.getElementById('totalSections').textContent = sections.length;
    document.getElementById('totalH3').textContent = totalH3;
    document.getElementById('okCount').textContent = okCount;
    document.getElementById('holdCount').textContent = holdCount;
    document.getElementById('doneCount').textContent = doneCount;
    document.getElementById('doneTotal').textContent = sections.length;
}

// フィルター
let currentFilter = 'all';
document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentFilter = this.dataset.filter;
        renderSections(currentFilter);
    });
});

// 初期レンダリング
renderSideNav();
renderSections('all');
</script>
</body>
</html>
