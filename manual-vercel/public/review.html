<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マニュアル レビュー・意思決定シート</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif; background: #F5F5F5; color: #333; line-height: 1.6; }

        header { background: linear-gradient(135deg, #1565C0, #0D47A1); color: #fff; padding: 20px 24px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        header h1 { font-size: 1.3rem; }
        header p { font-size: 0.8rem; opacity: 0.85; margin-top: 4px; }

        .toolbar { background: #fff; border-bottom: 1px solid #E0E0E0; padding: 12px 24px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; position: sticky; top: 68px; z-index: 99; }
        .toolbar .progress-bar { flex: 1; min-width: 200px; }
        .toolbar .progress-bar-inner { background: #E0E0E0; border-radius: 10px; height: 10px; overflow: hidden; }
        .toolbar .progress-bar-fill { background: linear-gradient(90deg, #4CAF50, #2E7D32); height: 100%; border-radius: 10px; transition: width 0.4s ease; }
        .toolbar .progress-text { font-size: 0.8rem; color: #666; margin-top: 3px; }
        .toolbar .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
        .filter-btn { padding: 5px 14px; border: 1px solid #ccc; border-radius: 20px; background: #fff; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
        .filter-btn:hover { border-color: #1565C0; color: #1565C0; }
        .filter-btn.active { background: #1565C0; color: #fff; border-color: #1565C0; }
        .export-btn { padding: 6px 16px; background: #4CAF50; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        .export-btn:hover { background: #388E3C; }
        .reset-btn { padding: 6px 16px; background: #757575; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
        .reset-btn:hover { background: #616161; }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        .category-header { background: #37474F; color: #fff; padding: 10px 18px; border-radius: 8px 8px 0 0; margin-top: 24px; font-size: 1rem; font-weight: bold; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .category-header .cat-count { font-size: 0.8rem; opacity: 0.7; }
        .category-header:hover { background: #455A64; }

        .item-card { background: #fff; border: 1px solid #E0E0E0; border-top: none; padding: 18px 20px; position: relative; transition: border-color 0.3s; }
        .item-card:last-child { border-radius: 0 0 8px 8px; }
        .item-card.decided-adopt { border-left: 4px solid #4CAF50; }
        .item-card.decided-reject { border-left: 4px solid #F44336; }
        .item-card.decided-hold { border-left: 4px solid #FF9800; }
        .item-card.decided-custom { border-left: 4px solid #9C27B0; }

        .item-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
        .item-number { display: inline-flex; align-items: center; justify-content: center; background: #1565C0; color: #fff; font-size: 0.75rem; font-weight: bold; width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; }
        .item-title { font-size: 1rem; font-weight: bold; flex: 1; }
        .priority-badge { padding: 2px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: bold; white-space: nowrap; }
        .priority-high { background: #FFCDD2; color: #B71C1C; }
        .priority-mid { background: #FFE0B2; color: #E65100; }
        .priority-low { background: #E0E0E0; color: #616161; }

        .item-body { margin-top: 10px; }
        .item-detail { font-size: 0.88rem; color: #555; margin-bottom: 8px; }
        .item-detail strong { color: #333; }

        .evidence { background: #FAFAFA; border: 1px solid #EEE; border-radius: 6px; padding: 10px 14px; margin: 8px 0; font-size: 0.82rem; }
        .evidence-label { font-weight: bold; color: #1565C0; font-size: 0.75rem; margin-bottom: 4px; }
        .evidence code { background: #E3F2FD; padding: 1px 5px; border-radius: 3px; font-family: 'Consolas', monospace; font-size: 0.82rem; }
        .evidence .line-ref { color: #999; font-size: 0.75rem; }

        .suggestion { background: #E8F5E9; border-left: 3px solid #4CAF50; padding: 8px 12px; border-radius: 0 6px 6px 0; font-size: 0.85rem; margin: 10px 0; color: #2E7D32; }

        .decision-area { margin-top: 14px; padding-top: 14px; border-top: 1px solid #F0F0F0; }
        .decision-label { font-size: 0.8rem; font-weight: bold; color: #666; margin-bottom: 6px; }
        .decision-btns { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
        .decision-btn { padding: 6px 16px; border: 2px solid #ccc; border-radius: 6px; background: #fff; cursor: pointer; font-size: 0.82rem; font-weight: bold; transition: all 0.2s; }
        .decision-btn:hover { transform: translateY(-1px); box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .decision-btn.adopt { border-color: #4CAF50; color: #2E7D32; }
        .decision-btn.adopt.selected { background: #4CAF50; color: #fff; }
        .decision-btn.reject { border-color: #F44336; color: #C62828; }
        .decision-btn.reject.selected { background: #F44336; color: #fff; }
        .decision-btn.hold { border-color: #FF9800; color: #E65100; }
        .decision-btn.hold.selected { background: #FF9800; color: #fff; }
        .decision-btn.custom { border-color: #9C27B0; color: #7B1FA2; }
        .decision-btn.custom.selected { background: #9C27B0; color: #fff; }

        .memo-area { margin-top: 8px; }
        .memo-area textarea { width: 100%; min-height: 50px; padding: 8px 10px; border: 1px solid #DDD; border-radius: 6px; font-size: 0.85rem; font-family: inherit; resize: vertical; transition: border-color 0.2s; }
        .memo-area textarea:focus { outline: none; border-color: #1565C0; box-shadow: 0 0 0 2px rgba(21,101,192,0.15); }
        .memo-area textarea::placeholder { color: #BBB; }
        .memo-saved { font-size: 0.75rem; color: #4CAF50; margin-top: 3px; opacity: 0; transition: opacity 0.3s; }
        .memo-saved.show { opacity: 1; }

        .summary-section { background: #fff; border-radius: 8px; padding: 20px; margin-top: 30px; border: 1px solid #E0E0E0; }
        .summary-section h2 { font-size: 1.1rem; color: #1565C0; margin-bottom: 12px; border-bottom: 2px solid #1565C0; padding-bottom: 6px; }
        .summary-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .summary-table th, .summary-table td { padding: 8px 10px; border: 1px solid #E0E0E0; text-align: left; }
        .summary-table th { background: #F5F5F5; font-weight: bold; }
        .summary-table .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
        .dot-adopt { background: #4CAF50; }
        .dot-reject { background: #F44336; }
        .dot-hold { background: #FF9800; }
        .dot-custom { background: #9C27B0; }
        .dot-none { background: #ccc; }

        footer { text-align: center; padding: 20px; color: #999; font-size: 0.75rem; margin-top: 30px; }

        @media (max-width: 640px) {
            header { padding: 14px 16px; }
            header h1 { font-size: 1.1rem; }
            .toolbar { top: 56px; padding: 10px 16px; }
            .container { padding: 12px; }
            .item-card { padding: 14px; }
            .decision-btns { gap: 4px; }
            .decision-btn { padding: 5px 10px; font-size: 0.78rem; }
        }
    </style>
</head>
<body>
    <header>
        <h1>マニュアル レビュー・意思決定シート</h1>
        <p>index.html の矛盾点・表記ゆれを確認し、対応方針を決定するツール</p>
    </header>

    <div class="toolbar">
        <div class="progress-bar">
            <div class="progress-bar-inner"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
            <div class="progress-text" id="progressText">0 / 14 件 対応済み</div>
        </div>
        <div class="filter-group">
            <button class="filter-btn active" data-filter="all">すべて</button>
            <button class="filter-btn" data-filter="undecided">未決定</button>
            <button class="filter-btn" data-filter="adopt">修正する</button>
            <button class="filter-btn" data-filter="reject">修正しない</button>
            <button class="filter-btn" data-filter="hold">保留</button>
        </div>
        <button class="export-btn" id="exportBtn">結果をコピー</button>
        <button class="reset-btn" id="resetBtn">リセット</button>
    </div>

    <div class="container" id="itemContainer"></div>

    <div class="container">
        <div class="summary-section" id="summarySection">
            <h2>対応方針サマリー</h2>
            <table class="summary-table" id="summaryTable">
                <thead><tr><th style="width:5%">#</th><th style="width:30%">項目</th><th style="width:12%">優先度</th><th style="width:15%">判定</th><th>メモ</th></tr></thead>
                <tbody id="summaryBody"></tbody>
            </table>
        </div>
    </div>

    <footer>マニュアル レビューシート &mdash; 保存データはブラウザのlocalStorageに自動保存されます</footer>

    <script>
    const ITEMS = [
        {
            id: 1,
            category: '表記ゆれ',
            title: '「解錠」vs「開錠」の表記ゆれ',
            priority: 'high',
            detail: 'マニュアル全体で「解錠」を使用しているが、アプリ画面遷移ガイドのセクションでのみ「開錠」を使用している。',
            evidence: [
                { text: '「解錠」を使用', refs: 'L653, L1249, L1321, L2248 など大半' },
                { text: '「開錠」を使用：「チェックイン～<strong>開錠</strong>～チェックアウトまで」', refs: 'L3101' },
                { text: '「ドアを<strong>開錠</strong>しました！」', refs: 'L3121' },
            ],
            suggestion: '「解錠」に統一。L3101, L3121 の「開錠」を「解錠」に修正。',
        },
        {
            id: 2,
            category: '表記ゆれ',
            title: '「ユーザー」vs「お客様」の表記ゆれ',
            priority: 'mid',
            detail: 'スタッフ向けマニュアルでは「お客様」が適切だが、一部で「ユーザー」が混在している。',
            evidence: [
                { text: '「<strong>ユーザー</strong>がアプリでQRコードを読み取る」', refs: 'L2483, L2503' },
                { text: '「<strong>ユーザー</strong>はスタディGOアプリを使わないと入室できません」', refs: 'L2231' },
                { text: '「<strong>ユーザー</strong>への来店案内」', refs: 'L2900' },
                { text: '「<strong>お客様</strong>」を使用', refs: 'その他の大半の箇所' },
            ],
            suggestion: '「お客様」に統一。ただし管理画面上の用語として「ユーザー」を使う箇所（管理画面操作方法セクション等）はそのままでOK。',
        },
        {
            id: 3,
            category: '表記ゆれ',
            title: '入会報告の「会員番号」vs「ID」',
            priority: 'high',
            detail: 'チャットワークへの入会報告で、「会員番号」と「ID」が混在している。スタディGOのIDと勉強カフェの会員番号は別物。',
            evidence: [
                { text: 'チャットワーク【入会情報】に<strong>会員番号</strong>・氏名を報告', refs: 'L2091, L2777' },
                { text: '新規入会があった場合は<strong>ID</strong>・氏名', refs: 'L3485' },
                { text: '<strong>ID</strong>・氏名を報告', refs: 'L3712' },
            ],
            suggestion: '「会員番号」に統一。L3485, L3712 の「ID」を「会員番号」に修正。',
        },
        {
            id: 4,
            category: '表記ゆれ',
            title: '「ビジター（時間利用）」の呼称不統一',
            priority: 'mid',
            detail: '時間利用のことを大半は「時間利用（ドロップイン）」と書いているが、1箇所だけ「ビジター（時間利用）」になっている。',
            evidence: [
                { text: '「時間利用（ドロップイン）」', refs: '大半の箇所' },
                { text: '「<strong>ビジター（時間利用）</strong>対応」', refs: 'L3602' },
            ],
            suggestion: '「時間利用（ドロップイン）対応」に修正。「ビジター」は他で使われていない。',
        },
        {
            id: 5,
            category: '表記ゆれ',
            title: '「プラン解約届」vs「Googleフォーム」',
            priority: 'mid',
            detail: '退会手続きの書類名が統一されていない。',
            evidence: [
                { text: '店頭で<strong>Googleフォーム回答</strong>', refs: 'L2612, L2645' },
                { text: '<strong>プラン解約届</strong>記入', refs: 'L3596' },
            ],
            suggestion: '「Googleフォーム回答」に統一。L3596を修正。',
        },
        {
            id: 6,
            category: '矛盾',
            title: 'スタジオルールの「打刻」表現',
            priority: 'high',
            detail: 'スタジオルール（ルールカード⑧）で「打刻」という旧BPアプリの用語が使われている。スタディGOでは「チェックイン・チェックアウト」。',
            evidence: [
                { text: 'ルールカード⑧：「ご利用開始とご利用終了時に<strong>打刻</strong>をお願いします。<strong>打刻</strong>されないまま営業時間終了で自動チェックアウトになります」', refs: 'L533-534' },
            ],
            suggestion: '「打刻」→「チェックイン・チェックアウト」に修正。ルールカード全体をスタディGO用語に更新。',
        },
        {
            id: 7,
            category: '矛盾',
            title: 'Akerun「スタッフ対応不要」とOP/CL作業の矛盾',
            priority: 'high',
            detail: '変更点まとめで「Akerunについてスタッフの対応は不要」と記載があるが、OP/CL作業ではAkerunのオートロック設定変更が必要になっている。',
            evidence: [
                { text: '「入館はスタディGOアプリで解錠。<strong>Akerunについてスタッフの対応は不要</strong>です。」', refs: 'L1538-1540' },
                { text: 'OP作業：「<strong>Akerunで入口ドアを解錠</strong>・入店」', refs: 'L3386' },
                { text: 'OP作業：「<strong>Akerunオートロック解除</strong>（有人時間帯）」', refs: 'L3396' },
                { text: 'CL作業：「Akerunオートロック設定を<strong>ON</strong>に戻す」', refs: 'L3464' },
            ],
            suggestion: '「お客様への Akerun対応は不要（入館はスタディGOアプリで解錠）」に文言を修正。スタッフのオートロック管理は引き続き必要であることを明示。',
        },
        {
            id: 8,
            category: '矛盾',
            title: '入退室の仕組み（有人時間帯の解錠）の矛盾',
            priority: 'mid',
            detail: '基本情報では有人・無人共通で「スタディGOアプリで解錠が必要」と書いてあるが、OP作業ではオートロックをOFFにしている。有人時間帯は解錠不要なはず。',
            evidence: [
                { text: '「入口ドアは施錠 ― <strong>スタディGOアプリで解錠</strong>が必要」（有人・無人共通欄）', refs: 'L653' },
                { text: 'OP作業：Akerunオートロック設定をOFFに変更（＝有人時間はドア解放）', refs: 'L3419-3422' },
            ],
            suggestion: '有人・無人の入館方法の違いを明記。有人時間帯は「ドアは解放済み（アプリ解錠不要）」、無人時間帯は「アプリで解錠が必要」と分けて記載。',
        },
        {
            id: 9,
            category: '矛盾',
            title: '見学予約テンプレートの文面矛盾',
            priority: 'mid',
            detail: '「見学予約の事前対応」セクション内に「この度はご契約いただき」という契約済み向けのテンプレートが配置されている。見学予約は契約前のため矛盾。',
            evidence: [
                { text: 'セクション名：「見学予約の事前対応（スタディGO経由）」', refs: 'L1921' },
                { text: 'テンプレ文面：「この度は<strong>ご契約</strong>いただき」', refs: 'L1936' },
            ],
            suggestion: '見学確認用テンプレートと契約済み来店案内テンプレートを分ける。または「来店予約」と「見学予約」のセクションを明確に分離する。',
        },
        {
            id: 10,
            category: '表記ゆれ',
            title: '入会金の説明不統一',
            priority: 'low',
            detail: '入会金の名称が箇所によって異なる。',
            evidence: [
                { text: '「<strong>入会金</strong> 11,000円（税込）」', refs: 'L473' },
                { text: '「11,000円（<strong>店舗別初期費用</strong>）」', refs: 'L2206' },
            ],
            suggestion: '「入会金 11,000円（税込）」に統一。',
        },
        {
            id: 11,
            category: '矛盾',
            title: '自動請求タイミングの矛盾',
            priority: 'high',
            detail: '月額の自動請求が「15日」と「1日」の両方が同一文に記載されている。',
            evidence: [
                { text: '「当月10日までに解約申請が無ければ、<strong>15日</strong>に翌月分請求。<strong>1日</strong>に1ヶ月単位で自動請求」', refs: 'L2223-2224' },
            ],
            suggestion: '正しい請求タイミングを確認して、一方に修正。（15日は翌月分の事前請求？ 1日は利用開始日の請求？意味が異なるなら分かりやすく書き分ける）',
        },
        {
            id: 12,
            category: '表記ゆれ',
            title: '休会の締日に時間の記載なし',
            priority: 'low',
            detail: '退会は「10日21時まで」と時間まで明記しているが、休会は「10日まで」としか書かれていない。',
            evidence: [
                { text: '退会：「10日<strong>21時</strong>まで」', refs: 'L2649' },
                { text: '休会：「毎月<strong>10日まで</strong>に申請」（時間なし）', refs: 'L2665' },
            ],
            suggestion: '休会も「10日21時まで」なのか確認し、時間を明記する。',
        },
        {
            id: 13,
            category: '表記ゆれ',
            title: 'スタジオ名称の不統一',
            priority: 'low',
            detail: '「BPスタジオ」「新宿BPスタジオ」「新宿BPスタジオ（西口）」が混在。新宿スタジオも同様。',
            evidence: [
                { text: '「BPスタジオ」のみ', refs: '多数' },
                { text: '「新宿BPスタジオ（西口）」', refs: 'L699' },
                { text: '「新宿スタジオ（南口）」', refs: 'L698' },
            ],
            suggestion: 'ルールを決めて統一。例：初出時は「新宿BPスタジオ（西口）」、以降は「BPスタジオ」で統一。',
        },
        {
            id: 14,
            category: '重複',
            title: '即日入会手順が4箇所に重複',
            priority: 'mid',
            detail: '同じ即日入会手順（最短利用開始日を0日に変更→戻す）が4箇所に記載されている。ユーザーの好み（重複を避けてシンプルに）に反する。',
            evidence: [
                { text: '変更点まとめ「即日入会時の設定変更」', refs: 'L1516-1524' },
                { text: '対応フロー全体像の月額契約パネル', refs: 'L1858-1866' },
                { text: '月額契約セクション「即日入会の手順」', refs: 'L2188-2200' },
                { text: 'スタッフマニュアル「入会対応」', refs: 'L3554-3556' },
            ],
            suggestion: '1箇所（対応フローまたは月額契約セクション）に詳細を残し、他はリンク参照に変更。',
        },
    ];

    const STORAGE_KEY = 'manual_review_decisions';

    function loadData() {
        try {
            return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        } catch { return {}; }
    }
    function saveData(data) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function getPriorityLabel(p) {
        if (p === 'high') return '<span class="priority-badge priority-high">重要</span>';
        if (p === 'mid') return '<span class="priority-badge priority-mid">中</span>';
        return '<span class="priority-badge priority-low">低</span>';
    }

    function getDecisionLabel(d) {
        if (d === 'adopt') return '修正する';
        if (d === 'reject') return '修正しない';
        if (d === 'hold') return '保留';
        if (d === 'custom') return '別対応';
        return '未決定';
    }
    function getDecisionDot(d) {
        if (d === 'adopt') return 'dot-adopt';
        if (d === 'reject') return 'dot-reject';
        if (d === 'hold') return 'dot-hold';
        if (d === 'custom') return 'dot-custom';
        return 'dot-none';
    }

    let currentFilter = 'all';

    function render() {
        const data = loadData();
        const container = document.getElementById('itemContainer');
        container.innerHTML = '';

        const grouped = {};
        ITEMS.forEach(item => {
            if (!grouped[item.category]) grouped[item.category] = [];
            grouped[item.category].push(item);
        });

        const categoryOrder = ['矛盾', '表記ゆれ', '重複'];
        const sortedKeys = categoryOrder.filter(k => grouped[k]);

        sortedKeys.forEach(catName => {
            const items = grouped[catName];
            const filteredItems = items.filter(item => {
                const d = data[item.id]?.decision || '';
                if (currentFilter === 'all') return true;
                if (currentFilter === 'undecided') return !d;
                return d === currentFilter;
            });

            if (filteredItems.length === 0) return;

            const header = document.createElement('div');
            header.className = 'category-header';
            header.innerHTML = catName + '<span class="cat-count">' + filteredItems.length + '件</span>';
            container.appendChild(header);

            filteredItems.forEach(item => {
                const itemData = data[item.id] || {};
                const decision = itemData.decision || '';
                const memo = itemData.memo || '';

                const card = document.createElement('div');
                card.className = 'item-card' + (decision ? ' decided-' + decision : '');
                card.setAttribute('data-id', item.id);

                let evidenceHtml = '';
                item.evidence.forEach(e => {
                    evidenceHtml += '<div style="margin-bottom:4px;">' + e.text + ' <span class="line-ref">(' + e.refs + ')</span></div>';
                });

                card.innerHTML = `
                    <div class="item-header">
                        <span class="item-number">${item.id}</span>
                        <span class="item-title">${item.title}</span>
                        ${getPriorityLabel(item.priority)}
                    </div>
                    <div class="item-body">
                        <div class="item-detail">${item.detail}</div>
                        <div class="evidence">
                            <div class="evidence-label">該当箇所</div>
                            ${evidenceHtml}
                        </div>
                        <div class="suggestion">${item.suggestion}</div>
                        <div class="decision-area">
                            <div class="decision-label">対応方針</div>
                            <div class="decision-btns">
                                <button class="decision-btn adopt ${decision==='adopt'?'selected':''}" data-id="${item.id}" data-decision="adopt">修正する</button>
                                <button class="decision-btn reject ${decision==='reject'?'selected':''}" data-id="${item.id}" data-decision="reject">修正しない</button>
                                <button class="decision-btn hold ${decision==='hold'?'selected':''}" data-id="${item.id}" data-decision="hold">保留</button>
                                <button class="decision-btn custom ${decision==='custom'?'selected':''}" data-id="${item.id}" data-decision="custom">別対応</button>
                            </div>
                            <div class="memo-area">
                                <textarea placeholder="メモ（理由や別対応の内容など）" data-memo-id="${item.id}">${memo}</textarea>
                                <div class="memo-saved" id="memo-saved-${item.id}">保存しました</div>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        });

        // event listeners
        container.querySelectorAll('.decision-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const id = parseInt(this.dataset.id);
                const decision = this.dataset.decision;
                const data = loadData();
                if (!data[id]) data[id] = {};

                if (data[id].decision === decision) {
                    delete data[id].decision;
                } else {
                    data[id].decision = decision;
                }
                saveData(data);
                render();
            });
        });

        let memoTimers = {};
        container.querySelectorAll('textarea[data-memo-id]').forEach(ta => {
            ta.addEventListener('input', function() {
                const id = parseInt(this.dataset.memoId);
                clearTimeout(memoTimers[id]);
                memoTimers[id] = setTimeout(() => {
                    const data = loadData();
                    if (!data[id]) data[id] = {};
                    data[id].memo = this.value;
                    saveData(data);
                    const saved = document.getElementById('memo-saved-' + id);
                    if (saved) { saved.classList.add('show'); setTimeout(() => saved.classList.remove('show'), 1500); }
                    updateProgress();
                    updateSummary();
                }, 400);
            });
        });

        updateProgress();
        updateSummary();
    }

    function updateProgress() {
        const data = loadData();
        const total = ITEMS.length;
        let decided = 0;
        ITEMS.forEach(item => { if (data[item.id]?.decision) decided++; });
        const pct = Math.round(decided / total * 100);
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('progressText').textContent = decided + ' / ' + total + ' 件 対応済み（' + pct + '%）';
    }

    function updateSummary() {
        const data = loadData();
        const tbody = document.getElementById('summaryBody');
        tbody.innerHTML = '';
        ITEMS.forEach(item => {
            const d = data[item.id]?.decision || '';
            const memo = data[item.id]?.memo || '';
            const priorityText = item.priority === 'high' ? '重要' : item.priority === 'mid' ? '中' : '低';
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.id}</td>
                <td>${item.title}</td>
                <td>${priorityText}</td>
                <td><span class="status-dot ${getDecisionDot(d)}"></span>${getDecisionLabel(d)}</td>
                <td style="font-size:0.8rem;color:#666;">${memo ? memo.replace(/\n/g, '<br>') : '—'}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // filter
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentFilter = this.dataset.filter;
            render();
        });
    });

    // export
    document.getElementById('exportBtn').addEventListener('click', function() {
        const data = loadData();
        let text = '# マニュアル レビュー結果\n\n';
        ITEMS.forEach(item => {
            const d = data[item.id]?.decision || '';
            const memo = data[item.id]?.memo || '';
            const priorityText = item.priority === 'high' ? '重要' : item.priority === 'mid' ? '中' : '低';
            text += `## ${item.id}. ${item.title}（${priorityText}）\n`;
            text += `判定: ${getDecisionLabel(d)}\n`;
            if (memo) text += `メモ: ${memo}\n`;
            text += `提案: ${item.suggestion.replace(/<[^>]+>/g, '')}\n\n`;
        });
        navigator.clipboard.writeText(text).then(() => {
            this.textContent = 'コピーしました';
            setTimeout(() => { this.textContent = '結果をコピー'; }, 2000);
        });
    });

    // reset
    document.getElementById('resetBtn').addEventListener('click', function() {
        if (confirm('すべての判定・メモをリセットしますか？')) {
            localStorage.removeItem(STORAGE_KEY);
            render();
        }
    });

    render();
    </script>
</body>
</html>
