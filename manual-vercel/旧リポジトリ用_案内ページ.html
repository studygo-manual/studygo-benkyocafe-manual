<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スタディGO スタッフマニュアル（社内限定版に移行しました）</title>
<style>
  body {
    margin: 0;
    font-family: system-ui, -apple-system, 'Segoe UI', 'Hiragino Sans', sans-serif;
    background: linear-gradient(135deg, #fff9e6 0%, #ffd966 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    padding: 48px 36px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    max-width: 560px;
    width: 100%;
    text-align: center;
  }
  .icon { font-size: 56px; margin-bottom: 16px; }
  h1 {
    font-size: 22px;
    color: #333;
    margin: 0 0 24px;
  }
  .notice {
    background: #fff9e6;
    border-left: 4px solid #f5b800;
    padding: 16px 20px;
    border-radius: 6px;
    text-align: left;
    line-height: 1.7;
    font-size: 14px;
    color: #555;
    margin-bottom: 28px;
  }
  .url-box {
    background: #f5f5f5;
    padding: 16px;
    border-radius: 8px;
    font-family: ui-monospace, 'SFMono-Regular', Menlo, monospace;
    font-size: 13px;
    word-break: break-all;
    margin-bottom: 20px;
  }
  .cta {
    display: inline-block;
    background: #ffd966;
    color: #333;
    font-weight: 600;
    padding: 14px 28px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 15px;
    transition: all 0.2s;
  }
  .cta:hover { background: #f5b800; }
  .contact {
    margin-top: 28px;
    font-size: 13px;
    color: #888;
    line-height: 1.7;
  }
  .contact a { color: #666; }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">🦆</div>
    <h1>スタッフマニュアルは<br>社内限定ページに移行しました</h1>

    <div class="notice">
      <strong>ご案内:</strong><br>
      本マニュアルは勉強カフェ新宿スタジオ スタッフ限定の社内ページとなりました。
      許可された Google アカウントでのログインが必要です。
    </div>

    <div class="url-box">
      <!-- ↓ Vercel本番URLに差し替えてください -->
      https://studygo-manual-private.vercel.app
    </div>

    <!-- ↓ Vercel本番URLに差し替えてください -->
    <a class="cta" href="https://studygo-manual-private.vercel.app">
      新しいマニュアルを開く →
    </a>

    <div class="contact">
      アクセス権が必要な場合は<br>
      國松（<a href="mailto:s_kunimatsu@b-pt.jp">s_kunimatsu@b-pt.jp</a>）までご連絡ください。
    </div>
  </div>
</body>
</html>
